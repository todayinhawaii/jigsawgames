<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome — jigsaw.games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Cinzel+Decorative:wght@900&display=block" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080808;color:#f0ede8;font-family:'Inter',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;padding:20px;}
.emoji{font-size:72px;margin-bottom:16px;}
.title{font-family:'Cinzel Decorative',serif;font-size:clamp(22px,5vw,32px);
  background:linear-gradient(180deg,#ffd700,#c9a84c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.sub{font-size:15px;color:rgba(255,255,255,0.6);margin-bottom:32px;line-height:1.7;max-width:400px;}
.btn{padding:16px 40px;border:none;border-radius:14px;
  font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:900;
  color:#080808;cursor:pointer;
  background:linear-gradient(135deg,#ffd700,#c9a84c);
  box-shadow:0 6px 0 #7a5c14,0 8px 24px rgba(201,168,76,0.4);
  text-decoration:none;display:inline-block;}
</style>
</head>
<body>
<div class="emoji">🧩🎉</div>
<div class="title">Welcome to jigsaw.games!</div>
<div class="sub">Your subscription is active!! All 9 beautiful puzzles are now unlocked and waiting for you!!</div>
<a href="/" class="btn">✦ Start Puzzling ✦</a>
</body>
</html>
